<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>WCS26 • Regarder le match</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffaa33'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='44' font-weight='bold' font-family='Arial'%3E🏆%3C/text%3E%3C/svg%3E" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Barlow+Condensed:ital,wght@0,700;0,800;0,900;1,800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --card: rgba(20, 20, 25, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --sub: #a0a0a0;
      --muted: #666;
      --accent: #ffaa33;
      --accent-dark: #ff7744;
      --accent-glow: rgba(255, 170, 51, 0.4);
      --radius-lg: 24px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, #1a0f08 0%, var(--bg) 80%);
      background-attachment: fixed;
      color: var(--text);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.8rem;
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -1px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-icon { font-size: 2.2rem; filter: drop-shadow(0 0 8px var(--accent-glow)); }
    .logo .w { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
    .logo .c { color: #ffaa55; }
    .logo .s { color: #ffcc77; }

    .back-btn {
      background: rgba(255, 170, 51, 0.15);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: var(--accent);
      color: #050505;
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.8rem;
    }

    .player-section {
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .player-header {
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .player-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      background: linear-gradient(135deg, #ff3355, #cc0044);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 800;
      color: white;
    }

    .match-name {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 500px;
    }

    #videoFrame {
      width: 100%;
      height: 550px;
      border: none;
      background: #000;
      display: none;
    }

    /* Écran d'attente */
    .waiting-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0a10, #000);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    .waiting-content {
      text-align: center;
      padding: 2rem;
    }

    .waiting-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.05); }
    }

    .waiting-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }

    .waiting-subtitle {
      color: var(--sub);
      margin-bottom: 1.5rem;
    }

    .countdown-timer {
      font-size: 3rem;
      font-weight: 800;
      font-family: monospace;
      color: var(--accent);
      background: rgba(0, 0, 0, 0.6);
      padding: 1rem 2rem;
      border-radius: 60px;
      display: inline-block;
      margin-bottom: 1.5rem;
      letter-spacing: 5px;
    }

    .match-info-card {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 16px;
      padding: 1rem;
      margin-top: 1rem;
      display: inline-block;
    }

    .match-info-card p {
      margin: 0.3rem 0;
      font-size: 0.9rem;
    }

    .match-info-card strong {
      color: var(--accent);
    }

    .progress-bar {
      width: 300px;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      margin: 1rem auto;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      width: 0%;
      transition: width 1s linear;
    }

    .player-footer {
      padding: 0.8rem 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--line);
      font-size: 0.75rem;
      color: var(--sub);
      text-align: center;
    }

    @media (max-width: 768px) {
      .main { padding: 1rem; }
      #videoFrame { height: 350px; }
      .nav-inner { flex-direction: column; text-align: center; }
      .countdown-timer { font-size: 2rem; padding: 0.5rem 1rem; letter-spacing: 3px; }
      .waiting-title { font-size: 1.4rem; }
    }
  </style>
</head>

<nav>

    </div>
    <div class="player-footer">

  </div>
</main>

// Normalisation des noms
function normalizeString(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Variables globales
let countdownInterval = null;
let progressInterval = null;
let hasStarted = false;

// Éléments DOM
const videoFrame = document.getElementById('videoFrame');
const waitingScreen = document.getElementById('waitingScreen');
const countdownTimer = document.getElementById('countdownTimer');
const progressFill = document.getElementById('progressFill');
const matchInfoCard = document.getElementById('matchInfoCard');
const matchNameSpan = document.getElementById('matchName');

// Récupération du match depuis l'URL
const urlParams = new URLSearchParams(window.location.search);
const matchKey = urlParams.get('match');

// Formatage de la date pour l'affichage
function formatMatchDateTime(dateStr, timeStr) {
  const [year, month, day] = dateStr.split('-');
  return `${day}/${month}/${year} à ${timeStr}`;
}

// Démarrer le compte à rebours
function startCountdown(matchDateTime) {
  const matchTime = new Date(matchDateTime).getTime();
  const TEN_MINUTES = 10 * 60 * 1000;
  const releaseTime = matchTime - TEN_MINUTES;
  
  function update() {
    const now = new Date().getTime();
    const diff = releaseTime - now;
    
    if (diff <= 0 && !hasStarted) {
      // Le match est accessible ! Lancer le stream
      clearInterval(countdownInterval);
      clearInterval(progressInterval);
      startStream();
      return;
    }
    
    if (diff > 0) {
      // Calcul du temps restant
      const hours = Math.floor(diff / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);
      
      countdownTimer.innerHTML = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
      
      // Calcul de la progression (entre 0 et 100%)
      const totalWaitTime = matchTime - TEN_MINUTES - (matchTime - 30 * 24 * 60 * 60 * 1000); // Approximation
      const elapsed = (matchTime - TEN_MINUTES) - diff;
      const progress = Math.min(100, Math.max(0, (elapsed / (matchTime - TEN_MINUTES - (matchTime - 7 * 24 * 60 * 60 * 1000))) * 100));
      progressFill.style.width = `${progress}%`;
    }
  }
  
  update();
  countdownInterval = setInterval(update, 1000);
}

// Lancer le stream
function startStream() {
  hasStarted = true;
  waitingScreen.style.display = 'none';
  videoFrame.style.display = 'block';
  
  // Charger la source du match
  const decodedMatch = decodeURIComponent(matchKey);
  const normalizedKey = normalizeString(decodedMatch);
  
  for (const [storedKey, url] of Object.entries(matchSources)) {
    const normalizedStored = normalizeString(storedKey);
    if (normalizedStored.includes(normalizedKey) || normalizedKey.includes(normalizedStored)) {
      videoFrame.src = url;
      break;
    }
  }
}

// Initialisation
if (matchKey) {
  const decodedMatch = decodeURIComponent(matchKey);
  matchNameSpan.innerText = decodedMatch;
  
  // Vérifier si le match a un horaire défini
  if (matchSchedules[decodedMatch]) {
    const [date, time] = matchSchedules[decodedMatch].split(' ');
    const matchDateTime = `${date}T${time}:00`;
    
    // Afficher les infos du match
    matchInfoCard.innerHTML = `
      <p>🏆 <strong>${decodedMatch}</strong></p>
      <p>📅 Date : <strong>${formatMatchDateTime(date, time)}</strong></p>
      <p>⏰ Début du live : <strong>10 minutes avant le coup d'envoi</strong></p>
    `;
    
    startCountdown(matchDateTime);
  } else {
    // Pas d'horaire défini, on lance directement
    matchInfoCard.innerHTML = `<p>🏆 <strong>${decodedMatch}</strong></p><p>⚡ Match disponible immédiatement</p>`;
    startStream();
  }
} else {
  matchNameSpan.innerText = "Aucun match sélectionné";
}
