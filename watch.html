  <title>WCS26 • Regarder le match</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='45' fill='%23ffaa33'/%3E%3Ctext x='50' y='68' text-anchor='middle' fill='white' font-size='44' font-weight='bold' font-family='Arial'%3E🏆%3C/text%3E%3C/svg%3E" type="image/svg+xml">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #050505;
      --surface: #0a0a0a;
      --card: rgba(20, 20, 25, 0.7);
      --line: rgba(255, 255, 255, 0.08);
      --text: #f5f5f5;
      --sub: #a0a0a0;
      --muted: #666;
      --accent: #ffaa33;
      --accent-dark: #ff7744;
      --accent-glow: rgba(255, 170, 51, 0.4);
      --radius-lg: 24px;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      background-image: radial-gradient(circle at 50% 0%, #1a0f08 0%, var(--bg) 80%);
      background-attachment: fixed;
      color: var(--text);
    }

    nav {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(5, 5, 5, 0.8);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.8rem;
    }

    .nav-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 900;
      font-size: 2rem;
      letter-spacing: -1px;
      text-decoration: none;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-icon { font-size: 2.2rem; filter: drop-shadow(0 0 8px var(--accent-glow)); }
    .logo .w { color: var(--accent); text-shadow: 0 0 15px var(--accent-glow); }
    .logo .c { color: #ffaa55; }
    .logo .s { color: #ffcc77; }

    .back-btn {
      background: rgba(255, 170, 51, 0.15);
      border: 1px solid var(--accent);
      padding: 0.5rem 1.2rem;
      border-radius: 40px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      transition: 0.2s;
    }

    .back-btn:hover {
      background: var(--accent);
      color: #050505;
    }

    .main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 1.8rem;
    }

    .player-section {
      background: var(--card);
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .player-header {
      background: rgba(0, 0, 0, 0.5);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid var(--line);
    }

    .player-title {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-badge {
      background: linear-gradient(135deg, #ff3355, #cc0044);
      padding: 0.3rem 1rem;
      border-radius: 30px;
      font-size: 0.7rem;
      font-weight: 800;
      color: white;
    }

    .match-name {
      font-weight: 700;
      font-size: 1.1rem;
    }

    .video-container {
      position: relative;
      width: 100%;
      background: #000;
      min-height: 500px;
    }

    #videoFrame {
      width: 100%;
      height: 550px;
      border: none;
      background: #000;
    }

    .player-footer {
      padding: 0.8rem 1.5rem;
      background: rgba(0, 0, 0, 0.3);
      border-top: 1px solid var(--line);
      font-size: 0.75rem;
      color: var(--sub);
      text-align: center;
    }

    @media (max-width: 768px) {
      .main { padding: 1rem; }
      #videoFrame { height: 350px; }
      .nav-inner { flex-direction: column; text-align: center; }
    }
  </style>

// Normalisation des noms pour la correspondance
function normalizeString(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Créer une version normalisée des clés pour la recherche
const normalizedSources = {};
for (const [key, url] of Object.entries(matchSources)) {
  normalizedSources[normalizeString(key)] = url;
}

// ==================== CODE PRINCIPAL ====================
const urlParams = new URLSearchParams(window.location.search);
const matchKey = urlParams.get('match');

const matchNameSpan = document.getElementById('matchName');
const videoFrame = document.getElementById('videoFrame');

if (matchKey) {
  const decodedMatch = decodeURIComponent(matchKey);
  matchNameSpan.innerText = decodedMatch;
  
  const normalizedKey = normalizeString(decodedMatch);
  
  if (normalizedSources[normalizedKey]) {
    videoFrame.src = normalizedSources[normalizedKey];
  } else {
    // Recherche plus souple
    let found = false;
    for (const [storedKey, url] of Object.entries(matchSources)) {
      const normalizedStored = normalizeString(storedKey);
      if (normalizedStored.includes(normalizedKey) || normalizedKey.includes(normalizedStored)) {
        videoFrame.src = url;
        found = true;
        break;
      }
    }
    if (!found) {
      matchNameSpan.innerText = decodedMatch + " (source non configurée)";
      videoFrame.src = "about:blank";
      console.log(`Source manquante pour: ${decodedMatch}`);
    }
  }
} else {
  matchNameSpan.innerText = "Aucun match sélectionné";
}

document.getElementById('logoHome').addEventListener('click', () => {
  window.location.href = 'index.html';
});
