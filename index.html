      cursor: pointer;

      justify-content: center;
    }

      border-radius: 40px;
      font-weight: 700;
      font-size: 0.9rem;

      background: transparent;
      border: none;
      color: var(--sub);

      transition: all 0.2s;

function getTodayDate() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  return `${year}-${month}-${day}`;
}

}

function formatMatchKey(home, away) {
  return `${home} vs ${away}`.replace(/é/g, 'e').replace(/è/g, 'e').replace(/ê/g, 'e').replace(/î/g, 'i').replace(/ô/g, 'o').replace(/û/g, 'u').replace(/ç/g, 'c').replace(/ë/g, 'e').replace(/ï/g, 'i');
}

function renderTodayMatches() {
  const container = document.getElementById('todayMatchesGrid');
  const todayMatches = getTodayMatches();
  const todayDate = new Date();
  const dateStr = todayDate.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  document.getElementById('currentDateDisplay').innerHTML = `📅 ${dateStr}`;

  if (todayMatches.length === 0) {
    container.innerHTML = `<div class="grid-empty">⚽ Aucun match programmé aujourd'hui.<br>Vérifiez le programme complet.</div>`;
    return;
  }

  container.innerHTML = todayMatches.map(match => `
    <div class="match-card" data-home="${match.home}" data-away="${match.away}" data-hour="${match.hour}">
      <div class="card-thumb">
        <div class="card-poster" style="background-image:url('https://tse2.mm.bing.net/th?q=${encodeURIComponent(match.home+' vs '+match.away)}+world+cup+2026&w=400&h=225&c=7')"></div>
        <div class="card-poster-overlay"></div>
        <div class="badge-time">🕒 ${match.hour}</div>
        <div class="badge-channels">📺 ${match.channels}</div>
      </div>
      <div class="card-body">
        <div class="card-teams">${match.home}<span> vs </span>${match.away}</div>
        <div class="card-info">Match • ${match.hour}</div>
        <div class="card-cta">▶ Regarder</div>
      </div>
    </div>
  `).join('');

  document.querySelectorAll('#todayMatchesGrid .match-card').forEach(card => {
    card.addEventListener('click', () => {
      const home = card.getAttribute('data-home');
      const away = card.getAttribute('data-away');
      window.location.href = `watch.html?match=${encodeURIComponent(home + ' vs ' + away)}`;
    });
  });
}

function renderFullProgramme() {
  const container = document.getElementById('fullProgrammeContainer');
  const grouped = {};
  allMatches.forEach(m => {
    if (!grouped[m.date]) grouped[m.date] = [];
    grouped[m.date].push(m);
  });
  const sortedDates = Object.keys(grouped).sort();
  let html = '';
  sortedDates.forEach(date => {
    const matches = grouped[date];
    const dateObj = new Date(date);
    const dateLabel = dateObj.toLocaleDateString('fr-FR', { weekday: 'long', day: 'numeric', month: 'long' });
    html += `<div class="day-group"><div class="day-title">📅 ${dateLabel}</div>`;
    matches.forEach(m => {
      html += `<div class="match-row">
        <div class="match-teams">${m.home}<span>vs</span>${m.away}</div>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
          <span class="match-hour">${m.hour}</span>
          <span class="match-channels">📺 ${m.channels}</span>
        </div>
      </div>`;
    });
    html += `</div>`;
  });
  container.innerHTML = html;
}

const livePage = document.getElementById('livePage');
const programmePage = document.getElementById('programmePage');
const tabs = document.querySelectorAll('.nav-tab');
const logoHome = document.getElementById('logoHome');

function switchPage(pageId) {
  if (pageId === 'live') {
    livePage.style.display = 'block';
    programmePage.style.display = 'none';
    renderTodayMatches();
  } else if (pageId === 'programme') {
    livePage.style.display = 'none';
    programmePage.style.display = 'block';
    renderFullProgramme();
  }
  tabs.forEach(t => {
    if (t.getAttribute('data-page') === pageId) t.classList.add('active');
    else t.classList.remove('active');
  });
}

tabs.forEach(t => {
  t.addEventListener('click', () => switchPage(t.getAttribute('data-page')));
});

logoHome.addEventListener('click', () => switchPage('live'));
document.getElementById('refreshBtn').addEventListener('click', () => {
  if (livePage.style.display !== 'none') renderTodayMatches();
  if (programmePage.style.display !== 'none') renderFullProgramme();
});

renderTodayMatches();
renderFullProgramme();
switchPage('live');
</script>
</body>
</html>
